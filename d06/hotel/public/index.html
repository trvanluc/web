<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý phòng</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h2>Quản lý phòng</h2>
        <div class="header-buttons">
            <button id="showBtn" class="btn-red">Hiển Thị</button>
            <button id="addBtn" class="btn-orange">Thêm mới phòng</button>
        </div>
    </div>

    <hr>

    <div class="form-row">

        <div class="input-group">
            <label>Tên phòng</label>
            <input type="text" id="name" placeholder="Tên phòng">
        </div>

        <div class="input-group">
            <label>Mô tả phòng</label>
            <input type="text" id="description" placeholder="Mô tả phòng">
        </div>

        <div class="input-group">
            <label>Giá</label>
            <input type="number" id="price" placeholder="Giá phòng">
        </div>

        <div class="input-group">
            <label>Hình ảnh</label>

            <input type="file" id="image" accept="image/*" hidden>

            <button type="button" class="upload-btn" onclick="document.getElementById('image').click()">
                📷 Chọn hình ảnh
            </button>

            <span id="fileName" class="file-name">Chưa chọn ảnh</span>
        </div>

    </div>

</div>

<script>
const API_URL = "https://69a77e422cd1d0552690c277.mockapi.io/rooms";


document.getElementById("addBtn").addEventListener("click", async () => {

    const name = document.getElementById("name").value;
    const description = document.getElementById("description").value;
    const price = document.getElementById("price").value;
    const file = document.getElementById("image").files[0];

    if (!name || !description || !price || !file) {
        alert("Vui lòng nhập đầy đủ thông tin!");
        return;
    }

    const reader = new FileReader();

    reader.onload = async function () {

        const base64Image = reader.result; 

        const room = {
            name,
            description,
            price,
            image: base64Image
        };

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(room)
            });

            if (!res.ok) throw new Error();

            alert("Thêm phòng thành công!");

            // Reset input
            document.getElementById("name").value = "";
            document.getElementById("description").value = "";
            document.getElementById("price").value = "";
            document.getElementById("image").value = "";

        } catch {
            alert("Có lỗi xảy ra!");
        }
    };

    reader.readAsDataURL(file); 
});


document.getElementById("showBtn").addEventListener("click", () => {
    window.location.href = "display.html";
});

const imageInput = document.getElementById("image");
const fileName = document.getElementById("fileName");

imageInput.addEventListener("change", function () {
    if (this.files.length > 0) {
        fileName.textContent = this.files[0].name;
    } else {
        fileName.textContent = "Chưa chọn ảnh";
    }
});
</script>

</body>
</html>
